<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Fundo na cor Vinho da identidade -->
  <rect width="512" height="512" fill="#4A1525" />
  
  <g stroke="#FFFFFF" stroke-width="28" stroke-linecap="square" stroke-linejoin="miter" fill="none">
    <!-- Linha base -->
    <line x1="110" y1="380" x2="402" y2="380" />
    
    <!-- Prédio 1 (Esquerda - Alto) -->
    <path d="M160 380 V120 H210 V380" />
    
    <!-- Prédio 2 (Centro - Médio) -->
    <path d="M230 380 V220 H280 V380" />
    
    <!-- Prédio 3 (Direita - Baixo) -->
    <path d="M300 380 V290 H350 V380" />
  </g>
</svg>
